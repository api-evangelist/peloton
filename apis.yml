aid: peloton
name: Peloton
description: >-
  A connected fitness company offering stationary bikes, treadmills, rowers, and
  a digital platform for live and on-demand fitness classes. Peloton pioneered
  the premium at-home fitness category, blending hardware, software, and
  instructor-led content into an interactive workout experience available across
  Peloton equipment and a standalone Peloton App on iOS, Android, web, and
  connected TV. Peloton does not publish a public developer API, partner portal,
  or third-party integration program; all API surfaces are internal and only
  reachable through the consumer apps. Reverse-engineered community libraries
  exist on GitHub but are unsupported by Peloton.
